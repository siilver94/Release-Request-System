Screens:
  ReleaseRequest_Screen:
    Properties:
      Fill: =
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |-
        =// =============================
        // [릴리즈 상태 요청 시스템] WorkRequest_Screen.OnVisible
        // 화면 진입 시 1회 실행: 로그인 사용자 정보 조회, 역할 판별, 필터/팝업 상태 초기화
        // =============================

        // -----------------------------
        // [1] 로그인 사용자 기본 정보
        // -----------------------------
        Set(varMyEmail, Lower(User().Email));

        // UserInfo_DB에서 조직정보 조회
        Set(
            varMyInfo,
            LookUp(UserInfo_DB, Lower('e-mail') = varMyEmail)
        );

        // 관리자(전체조회) 여부
        Set(varIsViewer, Lower(varMyEmail) = "eunseong.kim@tym.world");

        // 이름 정제: UserInfo_DB 우선, 없으면 FullName에서 정제
        Set(varMyNameFromDB, Coalesce(varMyInfo.이름_한글, ""));
        Set(
            varMyNameFromFullName,
            If(
                IsBlank(Find("(", User().FullName)),
                Concatenate(
                    Trim(Right(User().FullName, Len(User().FullName) - Find(" ", User().FullName))),
                    Trim(Left(User().FullName, Find(" ", User().FullName)))
                ),
                Trim(Left(User().FullName, Find("(", User().FullName) - 1))
            )
        );
        Set(varMyName, If(!IsBlank(varMyNameFromDB), varMyNameFromDB, varMyNameFromFullName));

        // 조직 정보 (요청 등록 시 기본값에 사용)
        Set(varMyDept, Coalesce(varMyInfo.부문, ""));
        Set(varMyTeam, Coalesce(varMyInfo.팀, ""));

        // -----------------------------
        // [2] 역할 판별 - DX팀 여부 (App.OnStart의 colDxTeam 기준)
        // -----------------------------
        Set(varIsDX, varMyEmail in colDxTeam.DxEmail);

        // -----------------------------
        // [3] 화면 상태 변수 초기화
        // -----------------------------
        Set(varShowRequestPopup, false);
        Set(varRequestMode, "View");
        Set(varSelectedRequest, Defaults(ReleaseRequest_DB));
        Set(varShowDeleteConfirmPopup, false);

        // -----------------------------
        // [4] 필터 기본값
        // -----------------------------
        Set(varPeriodFilter, "이번달");
        Set(varSearchText, "");
        Set(varOnlyOverdue, false);
        Set(varDateFrom, DateAdd(Today(), -30, TimeUnit.Days));
        Set(varDateTo, Now());
        ClearCollect(colSelectedForce, []);

        // -----------------------------
        // [5] 토스트 알림
        // -----------------------------
        Set(varShowToast, false);
        Set(varToastMessage, "");

        // -----------------------------
        // [6] 데이터 새로고침
        // -----------------------------
        Refresh(ReleaseRequest_DB);
        Refresh(UserInfo_DB);

        ClearCollect(colSelectedForce, Filter(ReleaseRequest_DB, false)); // 빈 컬렉션이지만 ReleaseRequest_DB와 동일한 스키마를 가짐
    Children:
      - Container1:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
