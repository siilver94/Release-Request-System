                  - btnBulkForceComplete:
                      Control: ModernButton@1.0.0
                      Properties:
                        Appearance: =ButtonAppearance.Secondary
                        BorderColor: =RGBA(53, 61, 63, 1)
                        BorderStyle: =BorderStyle.Solid
                        BorderThickness: =0.3
                        Font: =Font.Verdana
                        Height: =24
                        OnSelect: |-
                          =// ForAll이 원본 데이터소스를 직접 순회하며 Patch할 수 없어 임시 컬렉션으로 먼저 떠둠
                          ClearCollect(
                              colBulkOverdue,
                              Filter(
                                  ReleaseRequest_DB,
                                  Stage.Value = "진행중",
                                  SubmittedAt <= DateAdd(Now(), -3, TimeUnit.Days)
                              )
                          );

                          ForAll(
                              colBulkOverdue As req,
                              Patch(
                                  ReleaseRequest_DB,
                                  LookUp(ReleaseRequest_DB, ID = req.ID),
                                  {
                                      Stage: {Value: "완료"},
                                      Status: {Value: "강제완료"},
                                      CompletedAt: Now(),
                                      HandlerEmail: varMyEmail
                                  }
                              );
                              Office365Outlook.SendEmailV2(
                                  req.RequesterEmail,
                                  "[릴리즈 상태 변경] 강제완료 처리 - " & req.PartNo,
                                  Concatenate(
                                      "<div style='font-family:Segoe UI;'>",
                                      "<h3>강제완료 처리 안내</h3>",
                                      "<p><b>품번:</b> ", req.PartNo, "</p>",
                                      "<p>장기간 미확인으로 DX팀에서 일괄 강제완료 처리했습니다.</p>",
                                      "</div>"
                                  ),
                                  {IsHtml: true, Importance: "Normal"}
                              )
                          );

                          Clear(colBulkOverdue);
                          Refresh(ReleaseRequest_DB);
                          Set(varToastMessage, "3일 경과 건을 일괄 강제완료했습니다.");
                          Set(varShowToast, true);
                        Size: =11
                        Text: ="일괄 강제완료"
                        Width: =110
                        X: =12
                        Y: =9
